<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KitsuneZ Podcast — สรุปทุก EP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Anuphan:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16131f;
    --bg-soft:#1d1929;
    --panel:#241f33;
    --panel-edge:#332c47;
    --fox:#ff8a3d;
    --fox-soft:rgba(255,138,61,.12);
    --amber:#ffc857;
    --mint:#5bd6c0;
    --mint-soft:rgba(91,214,192,.12);
    --rose:#ff6b81;
    --rose-soft:rgba(255,107,129,.12);
    --ink:#ece8f4;
    --muted:#9a93b0;
    --mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Anuphan',sans-serif;
    line-height:1.75;
    font-size:16px;
  }
  ::selection{background:var(--fox);color:#16131f}
 
  .wrap{max-width:960px;margin:0 auto;padding:0 20px}
 
  /* ===== Header ===== */
  header{
    border-bottom:1px solid var(--panel-edge);
    background:
      radial-gradient(600px 220px at 85% -40%, rgba(255,138,61,.18), transparent 70%),
      var(--bg-soft);
  }
  .head-inner{padding:48px 0 0}
  .head-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .show-mark{
    display:flex;align-items:center;gap:14px;margin-bottom:14px;
  }
  .fox-badge{
    width:46px;height:46px;flex:none;border-radius:12px;
    background:linear-gradient(145deg,var(--fox),#e05f1a);
    display:grid;place-items:center;font-size:24px;
    box-shadow:0 6px 18px rgba(255,138,61,.35);
  }
  .show-name{
    font-family:'Chonburi',serif;
    font-size:clamp(26px,5vw,40px);
    letter-spacing:.5px;
    line-height:1.2;
  }
  .show-name span{color:var(--fox)}
  .show-sub{color:var(--muted);max-width:620px;font-size:15px}
 
  /* ===== Toolbar ===== */
  .toolbar{display:flex;gap:8px;flex:none;padding-top:6px}
  .tool-btn{
    appearance:none;cursor:pointer;
    border:1px solid var(--panel-edge);background:var(--panel);color:var(--muted);
    font-family:'Anuphan',sans-serif;font-size:13px;font-weight:600;
    padding:8px 14px;border-radius:10px;transition:.18s;white-space:nowrap;
  }
  .tool-btn:hover{color:var(--ink);border-color:var(--fox)}
  .tool-btn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .tool-btn.editing{background:var(--fox);border-color:var(--fox);color:#16131f}
 
  body.edit-mode [data-editable]{
    outline:1px dashed rgba(255,200,87,.5);outline-offset:6px;border-radius:4px;
  }
  body.edit-mode [data-editable]:focus-within{outline-color:var(--amber)}
  .edit-hint{
    display:none;font-size:12.5px;color:var(--amber);margin-top:10px;
  }
  body.edit-mode .edit-hint{display:block}
 
  /* ===== EP rail ===== */
  .ep-rail{
    display:flex;gap:10px;margin-top:24px;padding-bottom:0;
    overflow-x:auto;
  }
  .ep-tab{
    appearance:none;border:1px solid var(--panel-edge);
    background:var(--panel);color:var(--muted);
    font-family:'Anuphan',sans-serif;font-size:14px;font-weight:600;
    padding:10px 18px;border-radius:12px 12px 0 0;border-bottom:none;
    cursor:pointer;white-space:nowrap;transition:.18s;
  }
  .ep-tab .ep-no{font-family:var(--mono);font-size:12px;color:var(--fox);display:block;letter-spacing:1px}
  .ep-tab:hover{color:var(--ink)}
  .ep-tab.active{background:var(--bg);color:var(--ink);border-color:var(--fox);box-shadow:inset 0 3px 0 var(--fox)}
  .ep-tab:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
 
  main{padding:40px 0 80px}
 
  /* ===== Meta grid ===== */
  .meta-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:12px;margin-bottom:36px;
  }
  .meta-card{
    background:var(--panel);border:1px solid var(--panel-edge);
    border-radius:14px;padding:14px 16px;
  }
  .meta-card .k{font-size:12px;color:var(--muted);letter-spacing:.5px;margin-bottom:2px}
  .meta-card .v{font-weight:600;font-size:15px}
  .meta-card .v.mono{font-family:var(--mono);font-size:14px}
  .tool-btn.yt-btn{
    background:var(--fox-soft);border-color:var(--fox);color:var(--fox);
    display:inline-flex;align-items:center;gap:6px;text-decoration:none;
  }
  .tool-btn.yt-btn:hover{background:var(--fox);color:#16131f}
 
  /* ===== Sections ===== */
  .sec{margin-bottom:48px}
  .sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:18px}
  .sec-head h2{
    font-family:'Chonburi',serif;font-size:clamp(20px,3.4vw,26px);font-weight:400;
  }
  .sec-head .tag{
    font-family:var(--mono);font-size:12px;color:var(--fox);
    border:1px solid var(--fox);border-radius:99px;padding:2px 10px;white-space:nowrap;
  }
  .sec p.lead{color:var(--muted);margin-bottom:14px}
 
  .plain-list{list-style:none}
  .plain-list li{
    padding:10px 0 10px 26px;position:relative;border-bottom:1px dashed var(--panel-edge);
  }
  .plain-list li:last-child{border-bottom:none}
  .plain-list li::before{
    content:"🦊";position:absolute;left:0;top:10px;font-size:13px;filter:grayscale(.2);
  }
 
  /* ===== Topic cards ===== */
  .topic{
    background:var(--panel);border:1px solid var(--panel-edge);
    border-left:4px solid var(--fox);
    border-radius:14px;margin-bottom:14px;overflow:hidden;
  }
  .topic summary{
    list-style:none;cursor:pointer;padding:16px 18px;
    display:flex;align-items:center;gap:14px;
  }
  .topic summary::-webkit-details-marker{display:none}
  .topic summary:focus-visible{outline:2px solid var(--amber);outline-offset:-2px}
  .topic .t-no{
    font-family:var(--mono);font-size:13px;color:var(--amber);
    width:34px;flex:none;text-align:center;
  }
  .topic .t-title{font-weight:700;font-size:16px;flex:1}
  .topic .t-time{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}
  .topic .chev{color:var(--muted);transition:transform .2s;flex:none}
  .topic[open] .chev{transform:rotate(90deg)}
  .topic[open]{border-left-color:var(--amber)}
  .t-body{padding:0 18px 18px;border-top:1px dashed var(--panel-edge)}
  .t-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px dashed var(--panel-edge)}
  .t-row:last-child{border-bottom:none}
  .t-label{
    flex:none;width:96px;font-size:12px;font-weight:700;letter-spacing:.3px;
    border-radius:8px;padding:3px 0;text-align:center;height:fit-content;margin-top:3px;
  }
  .t-label.pain{background:var(--rose-soft);color:var(--rose)}
  .t-label.ctx{background:rgba(154,147,176,.14);color:var(--muted)}
  .t-label.idea{background:var(--fox-soft);color:var(--fox)}
  .t-label.praise{background:var(--mint-soft);color:var(--mint)}
.t-text{font-size:15px;color:var(--ink)}
  .t-text ul{list-style:none;display:flex;flex-direction:column;gap:6px}
  .t-text li{position:relative;padding-left:16px}
  .t-text li::before{content:"–";position:absolute;left:0;color:var(--muted)}
 
  .subtopics{margin-top:4px;padding:0 18px 14px;display:flex;flex-direction:column;gap:10px}
  .subtopic{
    background:var(--bg-soft);border:1px solid var(--panel-edge);
    border-radius:10px;padding:12px 14px;
  }
  .subtopic .sub-title{
    font-size:13px;font-weight:700;color:var(--amber);margin-bottom:8px;
    display:flex;align-items:center;gap:6px;
  }
  .subtopic .sub-title::before{content:"↳";color:var(--muted)}
  .subtopic .t-row{padding:8px 0}
  .subtopic .t-label{width:80px;font-size:11px}
 
  /* ===== Recap ===== */
  .recap{counter-reset:rc;list-style:none}
  .recap li{
    counter-increment:rc;position:relative;
    padding:12px 0 12px 46px;border-bottom:1px dashed var(--panel-edge);
  }
  .recap li:last-child{border-bottom:none}
  .recap li::before{
    content:counter(rc);
    position:absolute;left:0;top:14px;
    width:30px;height:30px;border-radius:9px;
    background:var(--fox-soft);color:var(--fox);
    font-family:var(--mono);font-size:14px;font-weight:600;
    display:grid;place-items:center;
  }
  .recap b{color:var(--amber)}
 
  /* ===== Suggestion table ===== */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--panel-edge);border-radius:14px}
  table{width:100%;border-collapse:collapse;min-width:640px;background:var(--panel)}
  th,td{padding:12px 14px;text-align:left;vertical-align:top;font-size:14.5px}
  th{
    background:var(--bg-soft);color:var(--muted);font-size:12.5px;
    letter-spacing:.4px;border-bottom:1px solid var(--panel-edge);white-space:nowrap;
  }
  tr+tr td{border-top:1px dashed var(--panel-edge)}
  .pill{
    display:inline-block;font-size:12px;font-weight:700;border-radius:99px;
    padding:2px 11px;white-space:nowrap;
  }
  .pill.reward{background:var(--fox-soft);color:var(--fox)}
  .pill.shop{background:var(--fox-soft);color:var(--fox)}
  .pill.price{background:rgba(255,200,87,.14);color:var(--amber)}
  .pill.event{background:var(--mint-soft);color:var(--mint)}
  .pill.comm{background:rgba(154,147,176,.16);color:#bdb6d6}
  .pill.system{background:var(--rose-soft);color:var(--rose)}
  .pill.operation{background:rgba(154,147,176,.16);color:#bdb6d6}
  .pill.activity{background:rgba(91,214,192,.12);color:var(--mint)}
 
  /* Type dropdown styled as a pill */
  select.pill{
    appearance:none;-webkit-appearance:none;-moz-appearance:none;
    border:1px solid transparent;cursor:pointer;
    font-family:'Anuphan',sans-serif;
  }
  select.pill:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  select.pill option{background:var(--panel);color:var(--ink)}
 
  .add-row-wrap{padding:14px;text-align:center;border-top:1px dashed var(--panel-edge)}
  .add-row-btn{
    appearance:none;cursor:pointer;border:1px dashed var(--panel-edge);
    background:transparent;color:var(--muted);font-family:'Anuphan',sans-serif;
    font-size:13px;font-weight:600;padding:8px 16px;border-radius:10px;transition:.18s;
  }
  .add-row-btn:hover{color:var(--fox);border-color:var(--fox)}
  .sugg-text{outline:none;border-radius:4px}
  body.edit-mode .sugg-text{background:rgba(255,200,87,.06)}
  .del-row{
    appearance:none;cursor:pointer;border:none;background:transparent;
    color:var(--muted);font-size:16px;line-height:1;padding:2px 6px;border-radius:6px;
  }
  .del-row:hover{color:var(--rose);background:var(--rose-soft)}
 
  /* ===== Note / coming soon ===== */
  .note{
    background:linear-gradient(135deg,var(--fox-soft),transparent 60%),var(--panel);
    border:1px solid var(--panel-edge);border-radius:14px;
    padding:18px 20px;color:var(--muted);font-size:14.5px;
  }
  .note b{color:var(--fox)}
  .coming{
    text-align:center;padding:90px 20px;color:var(--muted);
  }
  .coming .big{font-family:'Chonburi',serif;font-size:30px;color:var(--ink);margin-bottom:10px}
  .coming .spoil{
    display:inline-block;margin-top:18px;text-align:left;
    background:var(--panel);border:1px dashed var(--panel-edge);
    border-radius:14px;padding:16px 22px;
  }
  .coming .spoil .k{font-family:var(--mono);font-size:12px;color:var(--fox);margin-bottom:6px}
 
  .ep-panel{display:none}
  .ep-panel.active{display:block;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    .ep-panel.active{animation:none}
    html{scroll-behavior:auto}
  }
  @media (max-width:560px){
    .t-row{flex-direction:column;gap:6px}
    .t-label{width:110px}
    .topic .t-time{display:none}
  }
</style>
</head>
<body>
 
<header>
  <div class="wrap head-inner">
    <div class="head-top">
      <div class="show-mark" data-editable>
        <div class="fox-badge" contenteditable="false">🦊</div>
        <div>
          <div class="show-name">Kitsune<span>Z</span> Podcast</div>
          <div class="show-sub">สรุปประเด็นจากรายการพอดแคสต์</div>
        </div>
      </div>
      <div class="toolbar">
        <a class="tool-btn yt-btn" id="ytLink" href="#" target="_blank" rel="noopener">▶ ดูคลิปเต็มบน YouTube</a>
        <button class="tool-btn" id="editBtn" type="button">✏️ แก้ไขข้อความ</button>
        
      </div>
    </div>
    <div class="edit-hint">โหมดแก้ไขเปิดอยู่ — คลิกที่ข้อความใดก็ได้เพื่อแก้</div>
    <nav class="ep-rail" id="epRail" aria-label="เลือกตอน"></nav>
  </div>
</header>
 
<main class="wrap" id="main" data-editable></main>
 
<script>
/* =====================================================================
   เพิ่ม EP ใหม่: ก๊อปบล็อก object ใน EPISODES แล้วแก้เนื้อหาได้เลย
   ตั้ง status:"live" เมื่อมีเนื้อหา / "soon" เมื่อยังไม่ออก
===================================================================== */
const EPISODES = [
{
  id:"ep1",
  no:"EP.1",
  title:"ปัญหาของการสื่อสาร",
  status:"live",
  link:"https://www.youtube.com/live/hIVpkZjuReE?si=zpGq2dMDPGaK-kWj",
  meta:[
    {k:"โฮสต์", v:"เบส (KitsuneZ)"},
    {k:"แขกรับเชิญ", v:"องค์ชายบิ๊ก (Olympus)"},
    {k:"ความยาว", v:"~1 ชม. 20 นาที", mono:true},
    {k:"Sentiment โดยรวม", v:"บวก–กลาง · ชมหลายเรื่อง ติงเชิงสร้างสรรค์"}
  ],
  purpose:[
    "เป็นกระบอกเสียงรวบรวมปัญหา ข้อเสนอแนะ และคำถามจากผู้เล่น ส่งถึงทีมงานอย่างเป็นระบบ",
    "ขอให้คนดู \u201cสลัดคำว่าโพ/คา\u201d ออกก่อน — ไม่แบ่งฝ่าย ไม่โจมตีใคร มองเป็นปัญหาร่วมของคนเล่นทั้งเกม",
    "วางเป็นซีรีส์หลาย EP โดยแต่ละ EP เชิญแขกที่ตอบโจทย์หัวข้อนั้นๆ (โฮสต์และแขกเป็นหัวกิลด์/Top Spender ที่เข้าถึงช่องทางฟีดแบคโดยตรง)"
  ],
  topics:[
    {
      title:"ปัญหาการรับฟัง และผู้มีอำนาจส่งฟีดแบค",
      time:"00:07:49",
      pain:[
        "ฟีดแบคที่ทีมงานได้รับ อาจไม่ใช่ความต้องการของผู้เล่นส่วนใหญ่จริง — ผู้เล่นที่รู้เหลี่ยมสามารถนัดกัน 20–30 คน (หลายกิลด์ + Top Spender) รุมส่งเรื่องเดียวกันผ่านแอแคลร์ จนปัญหาของคนบางกลุ่มดูเป็นปัญหาของทั้งเซิร์ฟ",
        "เคสสมมุติที่ยกมา: กิลด์ที่ไม่ได้ทำของมาสเตอร์ รวมตัวกัน 3 กิลด์ + ชวน Top Spender อีกหลายคน แจ้งฟีดแบคพร้อมกันว่า \u201cคนฝั่งนี้ไม่มีของมาสเตอร์ใช้\u201d ทำให้ตลาดไม่หมุน ใบแอมป์ขายไม่ได้ กาชาไม่มีใครเปิด — กลายเป็น \u201cปัญหาผู้เล่นส่วนใหญ่\u201d ในสายตาทีมงาน ทั้งที่เป็นปัญหาของกลุ่มที่ประสานงานกันมา",
        "ทีมงานหลังบ้านไม่ได้ลงมาเล่นเกมเอง และไม่เช็คสถานการณ์ในเกมจริง จึงไม่รู้ทันเหลี่ยม/สถานการณ์สงครามของผู้เล่น"
      ],
      ctx:[
        "ทีมแอแคลร์เป็นช่องทางประสานงานผู้เล่น 5 กลุ่ม: หัวกิลด์ / Mod–สตรีมเมอร์ / Top Spender / Official Facebook Page (คอมเมนต์) — แต่ละกลุ่มมีสิทธิ์/สวัสดิการต่างกัน เช่น Top Spender ได้สิทธิ์แก้ปัญหาไวกว่า",
        "แอแคลร์ตอบไวแทบ 24 ชม. แม้นอกเวลางาน (เคสตัวอย่าง: แจ้งปัญหาตี 2–3 ก็มีแอดมินตอบ) — เป็นจุดแข็งที่สุดของค่ายในมุมโฮสต์",
        "ช่องโหว่คือแอแคลร์ไม่ใช่ทีมงานหลังบ้าน รับฟีดแบคแล้วส่งต่อ แต่ไม่ได้กรองว่าเสียงที่ \u201cดูเยอะ\u201d มาจากการนัดประสานงานกันของคนกลุ่มเดียว"
      ],
      idea:[
        "ก่อนปรับอะไรที่กระทบวงกว้าง ให้เรียกหัวกิลด์ทั้ง 2 ฝั่งมาคุย/ประชุมก่อน เหมือนที่ทีมงานเคยทำผ่าน Line, เบอร์โทร, Discord หัวกิลด์",
        "อย่างน้อยให้เป็นการฟังเสียงส่วนใหญ่แบบคัดตัวแทน เช่น คัดหัวกิลด์ฝั่งโพล 4 คน ฝั่งคา 4 คน มาสอบถาม/โหวตว่าเป็นปัญหาจริงหรือไม่ ก่อนออกกิจกรรมที่กระทบสมดุลเกม"
      ],
      praise:[
        "ยกทีมแอแคลร์เป็นสิ่งอัศจรรย์/MVP ของค่าย — เคสกิจกรรม Path of Daw แจก 40 โค้ด หัวกิลด์ทุกกิลด์ฟีดแบคพร้อมกันว่าน้อยไป (ต้องปั้น 100 ตัวละครต่อกิลด์) ทีมงานปรับเป็น 60 โค้ดภายในคืนเดียว (ประชุมรอบสองราว 22:30)"
      ]
    },
    {
      title:"แฟนซีเน้นการสุ่ม — ชุดที่เหลือไปไหน",
      time:"00:24:16",

/* ===== Render (ข้ามถ้าไฟล์นี้ถูกบันทึกจากโหมดแก้ไขแล้ว) ===== */
const rail = document.getElementById('epRail');
const main = document.getElementById('main');
const alreadyRendered = main.dataset.rendered === '1';
 
if(!alreadyRendered){
const TYPE_OPTIONS = [
  {key:"comm", label:"Communication"},
  {key:"system", label:"System"},
  {key:"event", label:"Event / Reward"},
  {key:"shop", label:"Shop"},
  {key:"operation", label:"Operation"}
      ];
 
function typeSelect(currentType){
  const opts = TYPE_OPTIONS.map(o=>
    `<option value="${o.key}"${o.key===currentType?' selected':''}>${o.label}</option>`
  ).join('');
  return `<select class="pill ${currentType}" onchange="this.className='pill '+this.value">${opts}</select>`;
}
 
function addSuggestionRow(btn){
  const tbody = btn.closest('.tbl-wrap').querySelector('.sugg-body');
  const idx = tbody.children.length + 1;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="color:var(--muted);font-family:var(--mono)">${idx}</td>
    <td class="sugg-text" contenteditable="${editing?'true':'false'}" data-editable>พิมพ์รายการใหม่ที่นี่...</td>
    <td>${typeSelect('comm')}</td>
    <td style="text-align:center"><button type="button" class="del-row" title="ลบรายการนี้" onclick="this.closest('tr').remove()">✕</button></td>
  `;
  tbody.appendChild(tr);
  if(!editing) setEdit(true);
  const cell = tr.querySelector('.sugg-text');
  cell.focus();
  document.execCommand && document.execCommand('selectAll', false, null);
}
 
  EPISODES.forEach((ep,i)=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'ep-tab' + (i===0?' active':'');
    btn.dataset.ep = ep.id;
    btn.innerHTML = `<span class="ep-no">${ep.no}${ep.status==='soon'?' · เร็วๆ นี้':''}</span>${ep.title}`;
    rail.appendChild(btn);
 
    const panel = document.createElement('section');
    panel.className = 'ep-panel' + (i===0?' active':'');
    panel.id = 'panel-' + ep.id;
    panel.innerHTML = ep.status==='live' ? renderLive(ep) : renderSoon(ep);
    main.appendChild(panel);
  });
  main.dataset.rendered = '1';
}
 
const ytLink = document.getElementById('ytLink');
 
function updateYtLink(epId){
  const ep = EPISODES.find(e=>e.id===epId);
  if(ep && ep.link){
    ytLink.href = ep.link;
    ytLink.style.display = 'inline-flex';
  } else {
    ytLink.style.display = 'none';
  }
}
 
document.querySelectorAll('.ep-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.ep-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.ep-panel').forEach(p=>p.classList.remove('active'));
    const target = document.getElementById('panel-'+btn.dataset.ep);
    if(target) target.classList.add('active');
    updateYtLink(btn.dataset.ep);
  });
});
 
updateYtLink(EPISODES[0].id);
 
 
function list(val){
  const arr = Array.isArray(val) ? val : [val];
  return '<ul>' + arr.map(v=>`<li>${v}</li>`).join('') + '</ul>';
}
 
 
function renderLive(ep){
  const meta = ep.meta.map(m=>`
    <div class="meta-card"><div class="k">${m.k}</div><div class="v${m.mono?' mono':''}">${m.v}</div></div>
  `).join('');
 
  const purpose = ep.purpose.map(p=>`<li>${p}</li>`).join('');
 
  const topics = ep.topics.map((t,idx)=>`
    <details class="topic"${idx===0?' open':''}>
      <summary>
        <span class="t-no">${String(idx+1).padStart(2,'0')}</span>
        <span class="t-title">${t.title}</span>
        <span class="t-time">${t.time}</span>
        <span class="chev">▸</span>
      </summary>
      <div class="t-body">
        <div class="t-row"><span class="t-label pain">Pain Point</span><span class="t-text">${list(t.pain)}</span></div>
        <div class="t-row"><span class="t-label ctx">บริบท</span><span class="t-text">${list(t.ctx)}</span></div>
        <div class="t-row"><span class="t-label idea">ข้อเสนอ</span><span class="t-text">${list(t.idea)}</span></div>
        ${t.praise?`<div class="t-row"><span class="t-label praise">สิ่งที่ชม</span><span class="t-text">${list(t.praise)}</span></div>`:''}
      </div>
      ${t.subtopics ? `<div class="subtopics">${t.subtopics.map(st=>`
        <div class="subtopic">
          <div class="sub-title">${st.title}</div>
          <div class="t-row"><span class="t-label pain">Pain Point</span><span class="t-text">${list(st.pain)}</span></div>
          <div class="t-row"><span class="t-label idea">ข้อเสนอ</span><span class="t-text">${list(st.idea)}</span></div>
        </div>
      `).join('')}</div>` : ''}
    </details>
  `).join('');
 
  const recap = ep.recap.map(r=>`<li>${r}</li>`).join('');
 
  const sugg = ep.suggestions.map((s,idx)=>`
    <tr><td style="color:var(--muted);font-family:var(--mono)">${idx+1}</td>
    <td class="sugg-text" contenteditable="false" data-editable>${s.s}</td>
    <td>${typeSelect(s.type)}</td>
    <td style="text-align:center"><button type="button" class="del-row" title="ลบรายการนี้" onclick="this.closest('tr').remove()">✕</button></td></tr>
  `).join('');
 
  return `
    <div class="meta-grid">${meta}</div>
 
    <section class="sec">
      <div class="sec-head"><span class="tag">01</span><h2>จุดประสงค์ของ Podcast</h2></div>
      <ul class="plain-list">${purpose}</ul>
    </section>
 
    <section class="sec">
      <div class="sec-head"><span class="tag">02</span><h2>ประเด็นที่พูดถึงทั้ง ${ep.topics.length} ประเด็น</h2></div>
      <p class="lead">กดที่แต่ละประเด็นเพื่อดูรายละเอียด — แบ่งเป็น Pain Point / บริบท / ข้อเสนอจากผู้พูด / สิ่งที่ชม</p>
      ${topics}
    </section>
 
    <section class="sec">
      <div class="sec-head"><span class="tag">03</span><h2>การสรุปตอนท้ายของเบส</h2></div>
      <ol class="recap">${recap}</ol>
    </section>
 
    <section class="sec">
      <div class="sec-head"><span class="tag">04</span><h2>สิ่งที่ทีมงานสามารถนำไปแก้ไขปรับปรุง</h2></div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>#</th><th>รายการที่สามารถแก้ไข / ปรับปรุง</th><th>ประเภท</th><th></th></tr></thead>
          <tbody class="sugg-body">${sugg}</tbody>
        </table>
        <div class="add-row-wrap">
          <button type="button" class="add-row-btn" onclick="addSuggestionRow(this)">+ เพิ่มรายการ</button>
        </div>
      </div>
    </section>
 
    <div class="note">
      <b>ภาพรวม:</b> ${ep.overview}
    </div>
  `;
}
 
function renderSoon(ep){
  return `
    <div class="coming">
      <div class="big">${ep.no} — ${ep.title}</div>
      <div>ยังไม่เผยแพร่ · สรุปจะอัปเดตที่หน้านี้หลังรายการออกอากาศ</div>
      <div class="spoil">
        <div class="k">สปอยหัวข้อจาก EP.1</div>
        ${ep.spoil.map(s=>`<div>• ${s}</div>`).join('')}
      </div>
    </div>
  `;
}
 
/* ===== โหมดแก้ไขข้อความ ===== */
const editBtn = document.getElementById('editBtn');
const saveBtn = document.getElementById('saveBtn');
let editing = false;
 
function setEdit(on){
  editing = on;
  document.body.classList.toggle('edit-mode', on);
  document.querySelectorAll('[data-editable]').forEach(el=>{
    el.setAttribute('contenteditable', on ? 'true' : 'false');
  });
  editBtn.classList.toggle('editing', on);
  editBtn.textContent = on ? '✅ เสร็จสิ้น' : '✏️ แก้ไขข้อความ';
}
 
editBtn.addEventListener('click', ()=> setEdit(!editing));
 
// GitHub config
const GH_TOKEN = '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';
const GH_REPO  = 'PH3N3L0P3/Kitsunez-Podcast';
const GH_FILE  = 'index.html';
const GH_API   = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;

function syncSelects(){
  document.querySelectorAll('select').forEach(sel=>{
    Array.from(sel.options).forEach(opt=>{
      if(opt.value === sel.value){ opt.setAttribute('selected',''); }
      else { opt.removeAttribute('selected'); }
    });
  });
}

saveBtn.addEventListener('click', async ()=>{
  if(editing) setEdit(false);
  syncSelects();

  saveBtn.textContent = '⏳ กำลังบันทึก...';
  saveBtn.disabled = true;

  try {
    // Get current SHA (required for update)
    const getMeta = await fetch(GH_API, {
      headers: { Authorization: `token ${GH_TOKEN}`, Accept: 'application/vnd.github.v3+json' }
    });
    const meta = getMeta.ok ? await getMeta.json() : null;
    const sha = meta && meta.sha ? meta.sha : undefined;

    // Encode content
    const content = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    const encoded = btoa(unescape(encodeURIComponent(content)));

    // Push to GitHub
    const body = {
      message: `อัปเดต podcast summary ${new Date().toLocaleString('th-TH')}`,
      content: encoded,
      ...(sha ? { sha } : {})
    };

    const res = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        Authorization: `token ${GH_TOKEN}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if(res.ok){
      saveBtn.textContent = '✅ บันทึกแล้ว!';
      setTimeout(()=>{ saveBtn.textContent = '☁️ บันทึกขึ้น GitHub'; saveBtn.disabled = false; }, 3000);
    } else {
      const err = await res.json();
      throw new Error(err.message || res.status);
    }
  } catch(e) {
    saveBtn.textContent = '❌ บันทึกไม่สำเร็จ';
    saveBtn.disabled = false;
    alert('เกิดข้อผิดพลาด: ' + e.message);
  }
});
</script>
